<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>hub</title>

  <!-- Preconnect to font domains for faster DNS resolution -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts with font-display: swap to prevent render blocking -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Asynchronously load CSS to prevent render blocking -->
  <link rel="preload" href="dist/style.css" as="style">
  <link rel="stylesheet" href="dist/style.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="dist/style.css"></noscript>

  <!-- Optimized favicon -->
  <link rel="icon" type="image/png" href="img/faviconv2.png" sizes="32x32">
  
  <!-- Preload LCP image to improve LCP timing -->
  <link rel="preload" href="img/faviconv2.png" as="image">



</head>

<body>
  <main>
    <section class="nav">
      <div id="logo">
        <a href="index.html">
          <img class="logo" src="img/faviconv2.png" width="120" height="120" alt="Site logo" />
        </a>
      </div>
      <div class="social-links">
        <div id="link0">
          <a href="https://www.snapchat.com/" style="text-decoration: none;">
            <img class="contents" src="img/sclogo.png" width="48" height="48" alt="Dashboard icon" />
            <h3>Dashboard</h3>
          </a>
        </div>
        <div id="link1">
          <a href="https://twitter.com/" style="text-decoration: none;">
            <img class="contents" src="img/twlogo.png" width="48" height="48" alt="P2P icon" />
            <h3>P2P</h3>
          </a>
        </div>
        <div id="link2">
          <a href="https://instagram.com/" style="text-decoration: none;">
            <img class="contents" src="img/iglogo.png" width="48" height="48" alt="Syncthing icon" />
            <h3>Syncthing</h3>
          </a>
        </div>
      </div>
    </section>
  </main>




</body>

</html>
